name: Continuous Integration

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm run test:ci

      - name: Validate Infrastructure as Code (Bicep)
        run: az bicep build --file infra/main.bicep

      - name: Run Dependency Security Scan (Compliance Gate)
        run: npm run security-check

      - name: Package Build Artifact
        run: tar -czf build-artifact.tar.gz src/ package.json package-lock.json README.md infra/

      - name: Upload Versioned Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-package-node-${{ matrix.node-version }}
          path: build-artifact.tar.gz
          retention-days: 7

      - name: Auto-close Linked Issue
        if: github.event_name == 'pull_request' && matrix.node-version == '20.x' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ "$BRANCH_NAME" =~ ([0-9]+) ]]; then
            ISSUE_NUM="${BASH_REMATCH[1]}"
            echo "Detected issue number #$ISSUE_NUM from branch name: $BRANCH_NAME"
            gh issue close "$ISSUE_NUM" --comment "Automatically closed by GitHub Actions CI pipeline after successful validation checks on branch $BRANCH_NAME."
          else
            echo "No issue number found in branch name: $BRANCH_NAME"
          fi
